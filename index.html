<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>滑动拼图</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="main.js" defer></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js')
                .then(reg => {
                    console.log('Service Worker Registered');
                    reg.update();
                })
                .catch(err => console.error('Service Worker Registration failed:', err));
        }
    </script>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1 class="game-title">滑动拼图</h1>
            <div class="score-badge">
                <span class="score-label">步数</span>
                <span id="move-counter" class="score-value">0</span>
            </div>
        </header>

        <main class="game-main">
            <div id="game-board" class="game-board"></div>
            <div id="message" class="message"></div>
        </main>

        <footer class="controls">
            <div class="difficulty-control">
                <div class="difficulty-header">
                    <span>游戏难度</span>
                    <span id="difficulty-label" class="difficulty-badge">3×3</span>
                </div>
                <input type="range" id="difficulty-slider" class="slider" min="3" max="5" value="3">
                <div class="difficulty-labels">
                    <span>简单 3×3</span>
                    <span>中等 4×4</span>
                    <span>困难 5×5</span>
                </div>
            </div>

            <div class="button-group">
                <button id="start-button" class="btn btn-primary">开始游戏</button>
                <button id="rules-button" class="btn btn-secondary">游戏规则</button>
            </div>
        </footer>
    </div>

    <!-- Rules Modal -->
    <div id="rules-modal" class="modal">
        <div class="modal-content">
            <button class="close-button" id="close-modal">&times;</button>
            <h2>游戏规则</h2>
            <div class="rules-list">
                <div class="rule-item">
                    <span class="rule-icon">👆</span>
                    <span>点击紧靠空白格的数字方块来移动它</span>
                </div>
                <div class="rule-item">
                    <span class="rule-icon">🎯</span>
                    <span>将数字从左到右、从上到下按顺序排好</span>
                </div>
                <div class="rule-item">
                    <span class="rule-icon">⭐</span>
                    <span>步数越少，表现越好！</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
